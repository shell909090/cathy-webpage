<header class="site-header" role="banner">
  <div class="wrapper">
    <a class="site-title" rel="author" href="{{ "/" | relative_url }}">{{ site.title | escape }}</a>
    <nav class="site-nav">
      <input type="checkbox" id="nav-trigger" class="nav-trigger" />
      <label for="nav-trigger">
        <span class="menu-icon">
          <svg viewBox="0 0 18 15" width="18em" height="18em">
            <path d="M18 1.484h-16.727l-.161 13.032h16.888v-13.032zm-9.363 8.516h-5.545l.727-5.806h4.818v5.806zm6.182 0h-5.273v-5.806h5.273v5.806zm1.181-7.29l-2.909 2.29v-4.58h-14v4.58l-2.909-2.29v13.032h19.818v-13.032z"/>
          </svg>
        </span>
      </label>
      <div class="trigger">
        {%- for my_page in site.pages -%}
          {%- if my_page.title -%}
        <a class="page-link" href="{{ my_page.url | relative_url }}">{{ my_page.title | escape }}</a>
          {%- endif -%}
        {%- endfor -%}
      </div>
    </nav>
  </div>
</header>
